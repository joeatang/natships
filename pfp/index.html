<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0c">
<title>UNATOM · PFP</title>
<meta name="description" content="One unatom from the BLAST-OFF series. Save it. Post it. Feed the chain.">
<meta property="og:title" content="UNATOMS · my pfp">
<meta property="og:description" content="adopt a unatom. feed the chain.">
<meta property="og:url" content="https://unatom.fun/pfp/">
<style>
  :root{
    --bg:#0a0a0c; --ink:#f3eee3; --orange:#f0962d; --green:#7dcf5b;
    --pink:#f17d8e; --warm:#f9bc4f; --muted:rgba(243,238,227,0.5);
    --line:rgba(243,238,227,0.12);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--bg);color:var(--ink);font-family:ui-serif,"Iowan Old Style",Georgia,serif;min-height:100%;}
  body{padding:24px 16px 60px;max-width:760px;margin:0 auto;}
  header{text-align:center;padding:8px 0 22px}
  .eyebrow{font:600 11px/1 "SF Mono",ui-monospace,Menlo,monospace;letter-spacing:.24em;color:var(--orange);text-transform:uppercase;margin-bottom:10px}
  h1{font:900 clamp(26px,5vw,44px)/1 "Arial Black","SF Pro Display",system-ui,sans-serif;letter-spacing:-.02em}
  h1 .blk{color:var(--warm)}
  .frame{aspect-ratio:1/1;background:#13141b;border:1px solid var(--line);border-radius:18px;padding:8px;margin:22px 0;overflow:hidden}
  .frame svg{width:100%;height:100%;display:block}
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:8px 18px;padding:18px;border:1px solid var(--line);border-radius:14px;background:#13141b;margin-bottom:20px}
  .stat{display:flex;justify-content:space-between;font:500 12px/1.5 "SF Mono",ui-monospace,Menlo,monospace;border-bottom:1px solid var(--line);padding-bottom:6px}
  .stat:last-child,.stat:nth-last-child(2){border-bottom:0;padding-bottom:0}
  .stat .l{color:var(--muted);letter-spacing:.1em;text-transform:uppercase;font-size:10px}
  .stat .v{color:var(--ink);font-weight:600;text-align:right}
  .actions{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
  button,.actions a{font:700 14px/1 "SF Mono",ui-monospace,Menlo,monospace;letter-spacing:.14em;text-transform:uppercase;color:var(--bg);background:var(--ink);border:0;border-radius:999px;padding:18px 24px;cursor:pointer;text-decoration:none;text-align:center;transition:transform .1s,background .2s}
  button.primary{background:var(--orange);color:#0a0a0c}
  button:active{transform:scale(.98)}
  .actions a.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
  .actions a.ghost:hover{border-color:var(--orange)}
  nav{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:36px;padding-top:24px;border-top:1px solid var(--line)}
  nav a{font:600 10px/1 "SF Mono",ui-monospace,Menlo,monospace;letter-spacing:.16em;color:var(--muted);text-decoration:none;padding:6px 10px;text-transform:uppercase}
  nav a:hover{color:var(--orange)}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--ink);color:var(--bg);font:700 12px/1 "SF Mono",ui-monospace,Menlo,monospace;letter-spacing:.12em;padding:14px 22px;border-radius:999px;text-transform:uppercase;opacity:0;transition:opacity .3s;pointer-events:none;z-index:10}
  .toast.show{opacity:1}
</style>
</head>
<body>

<header>
  <div class="eyebrow">UNATOMS · BLAST-OFF SERIES</div>
  <h1>UNATOM <span class="blk" id="blkLabel">—</span></h1>
</header>

<div class="frame" id="frame"></div>

<div class="stats" id="stats"></div>

<div class="actions">
  <button class="primary" id="savePng">save as png</button>
  <button id="copyLink">copy share link</button>
  <a class="ghost" href="../">▸ play NAT READY?</a>
  <a class="ghost" href="../showcase/">← back to the 19</a>
</div>

<nav>
  <a href="../">lab</a>
  <a href="../showcase/">showcase</a>
  <a href="../catalog/">catalog</a>
  <a href="https://x.com/takedmt" target="_blank" rel="noopener">@takedmt</a>
  <a href="https://unatom.fun">unatom.fun</a>
</nav>

<div class="toast" id="toast">copied</div>

<script src="../unatom-render.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const block = Math.max(1, Math.min(10080, parseInt(params.get('block'), 10) || 10080));

  const t = UNATOM.fromBlock(block);

  // Figure out element category
  let catLabel = '';
  for (const cat of UNATOM.CATEGORIES) if (cat.els.includes(t.sym)) catLabel = cat.label;

  document.getElementById('blkLabel').textContent = '#' + block.toLocaleString();
  document.title = 'UNATOM #' + block + ' · ' + t.sym;
  document.getElementById('frame').innerHTML = UNATOM.svg(t);

  const statsEl = document.getElementById('stats');
  const rows = [
    ['element',  t.sym + ' · ' + (catLabel || '—').toLowerCase()],
    ['shell',    t.scheme],
    ['eye',      t.thirdEye],
    ['swag',     t.swagKind === 'none' ? '—' : t.swagKind],
    ['nature',   t.nature === 'none' ? '—' : t.nature],
    ['mood',     t.mood],
    ['mouth',    t.mouthKind === 'noMouth' ? 'sealed' : t.mouthKind],
    ['drip',     t.drip === 'noDrip' ? '—' : t.drip],
    ['glasses',  t.glasses === 'none' ? '—' : t.glasses],
    ['border',   t.border],
    ['eco',      t.eco],
    ['block',    '#' + block.toLocaleString() + ' / 10,080'],
  ];
  statsEl.innerHTML = rows.map(([l, v]) =>
    '<div class="stat"><span class="l">' + l + '</span><span class="v">' + v + '</span></div>'
  ).join('');

  // Toast helper
  const toast = document.getElementById('toast');
  function showToast(msg){
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => toast.classList.remove('show'), 1600);
  }

  // Copy share link
  document.getElementById('copyLink').onclick = async () => {
    const url = 'https://unatom.fun/pfp/?block=' + block;
    try {
      await navigator.clipboard.writeText(url);
      showToast('link copied');
    } catch {
      showToast('copy failed');
    }
  };

  // Save as PNG (2048×2048 from SVG)
  document.getElementById('savePng').onclick = async () => {
    const svgStr = UNATOM.svg(t);
    const SIZE = 2048;
    const canvas = document.createElement('canvas');
    canvas.width = SIZE; canvas.height = SIZE;
    const ctx = canvas.getContext('2d');
    // background tile color from scheme
    ctx.fillStyle = '#0a0b10';
    ctx.fillRect(0, 0, SIZE, SIZE);
    const img = new Image();
    const blobUrl = URL.createObjectURL(new Blob([svgStr], { type: 'image/svg+xml' }));
    img.onload = () => {
      ctx.drawImage(img, 0, 0, SIZE, SIZE);
      URL.revokeObjectURL(blobUrl);
      canvas.toBlob((blob) => {
        const fname = 'unatom-' + String(block).padStart(5, '0') + '.png';
        if (navigator.canShare && navigator.canShare({ files: [new File([blob], fname, { type: 'image/png' })] })) {
          const file = new File([blob], fname, { type: 'image/png' });
          navigator.share({ files: [file], title: 'UNATOM #' + block, text: 'my unatom · feed the chain · unatom.fun' })
            .catch(() => downloadBlob(blob, fname));
        } else {
          downloadBlob(blob, fname);
        }
      }, 'image/png');
    };
    img.onerror = () => showToast('render failed');
    img.src = blobUrl;
  };

  function downloadBlob(blob, fname){
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = fname;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); showToast('saved'); }, 100);
  }
</script>

</body>
</html>
