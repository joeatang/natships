<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0c">
<title>THE NINETEEN · UNATOMS</title>
<meta name="description" content="Nineteen UNATOMS hand-picked from the BLAST-OFF series. Every shell unique. Every block holds matter.">
<meta property="og:title" content="THE NINETEEN · UNATOMS">
<meta property="og:description" content="19 unatoms hand-picked from 10,080. feed the chain.">
<meta property="og:url" content="https://unatom.fun/showcase/">
<style>
  :root{
    --bg:#0a0a0c; --ink:#f3eee3; --orange:#f0962d; --green:#7dcf5b;
    --pink:#f17d8e; --warm:#f9bc4f; --muted:rgba(243,238,227,0.5);
    --line:rgba(243,238,227,0.12);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--bg);color:var(--ink);font-family:ui-serif,"Iowan Old Style",Georgia,serif;min-height:100%;}
  body{padding:24px 16px 80px;max-width:1280px;margin:0 auto;}
  header{text-align:center;padding:24px 8px 32px;border-bottom:1px solid var(--line);margin-bottom:32px}
  .eyebrow{font:600 11px/1 "SF Mono",ui-monospace,Menlo,monospace;letter-spacing:.24em;color:var(--orange);text-transform:uppercase;margin-bottom:14px}
  h1{font:900 clamp(38px,7vw,72px)/.95 "Arial Black","SF Pro Display",system-ui,sans-serif;letter-spacing:-.02em;margin-bottom:14px}
  .lede{color:var(--muted);font-size:15px;line-height:1.55;max-width:560px;margin:0 auto}
  .lede em{color:var(--ink);font-style:normal;font-weight:600}
  nav{display:flex;gap:14px;justify-content:center;margin-top:22px;flex-wrap:wrap}
  nav a{font:600 11px/1 "SF Mono",ui-monospace,Menlo,monospace;letter-spacing:.16em;color:var(--ink);text-decoration:none;padding:10px 16px;border:1px solid var(--line);border-radius:999px;text-transform:uppercase;transition:border-color .2s}
  nav a:hover{border-color:var(--orange)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:18px}
  .tile{position:relative;cursor:pointer;background:#13141b;border:1px solid var(--line);border-radius:14px;overflow:hidden;transition:transform .2s,border-color .2s,box-shadow .2s}
  .tile:hover{transform:translateY(-2px);border-color:var(--orange);box-shadow:0 12px 32px rgba(240,150,45,.15)}
  .tile .frame{aspect-ratio:1/1;background:#0a0b10;display:flex;align-items:center;justify-content:center;padding:6px}
  .tile svg{width:100%;height:100%;display:block}
  .tile .meta{padding:10px 12px 12px;border-top:1px solid var(--line);font:500 11px/1.4 "SF Mono",ui-monospace,Menlo,monospace;color:var(--muted);display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .tile .meta .blk{color:var(--ink);font-weight:600}
  .tile .meta .tag{color:var(--warm);text-transform:uppercase;letter-spacing:.1em;font-size:9px}
  .tile .badge{position:absolute;top:8px;right:8px;background:rgba(10,11,16,.85);color:var(--orange);font:700 9px/1 "SF Mono",ui-monospace,Menlo,monospace;letter-spacing:.12em;padding:5px 8px;border-radius:999px;text-transform:uppercase;border:1px solid rgba(240,150,45,.4);backdrop-filter:blur(6px)}
  .tile.locked .badge{color:var(--pink);border-color:rgba(241,125,142,.4)}
  footer{margin-top:64px;padding-top:32px;border-top:1px solid var(--line);text-align:center;color:var(--muted);font:500 11px/1.5 "SF Mono",ui-monospace,Menlo,monospace;letter-spacing:.1em}
  footer a{color:var(--ink);text-decoration:none;border-bottom:1px solid var(--line);padding-bottom:2px}
  footer a:hover{border-color:var(--orange)}
</style>
</head>
<body>

<header>
  <div class="eyebrow">UNATOMS · BLAST-OFF SERIES</div>
  <h1>THE NINETEEN</h1>
  <p class="lede">Nineteen unatoms pulled from the <em>10,080</em> in the BLAST-OFF range. Six locked to memetic blocks, thirteen curated for visual span. Every shell unique.</p>
  <nav>
    <a href="../">▸ play NAT READY?</a>
    <a href="../catalog/">see all 10,080</a>
    <a href="https://x.com/takedmt" target="_blank" rel="noopener">@takedmt</a>
  </nav>
</header>

<div class="grid" id="grid"></div>

<footer>
  UNATOMS · <a href="https://unatom.fun">unatom.fun</a> · FEED THE CHAIN
</footer>

<script src="../unatom-render.js"></script>
<script>
  // 19 picks — 6 memetic locks + 13 trait-curated (greedy variety + rarity)
  const PICKS = [
    { block: 1,     label: 'GENESIS',     locked: true,  tag: 'block 1' },
    { block: 69,    label: 'NICE',        locked: true,  tag: 'block 69' },
    { block: 420,   label: 'BLAZE',       locked: true,  tag: 'block 420' },
    { block: 6969,  label: 'DOUBLE NICE', locked: true,  tag: 'block 6969' },
    { block: 9999,  label: 'FOUR NINES',  locked: true,  tag: 'block 9999' },
    { block: 10080, label: 'BLAST OFF',   locked: true,  tag: 'finale' },
    { block: 8562,  label: 'AQUA',        locked: false, tag: 'closed eye' },
    { block: 3385,  label: 'BRONZE',      locked: false, tag: 'crosshair' },
    { block: 2228,  label: 'JADE',        locked: false, tag: 'aperture' },
    { block: 4978,  label: 'ORACLE',      locked: false, tag: 'chalk · oracle' },
    { block: 6280,  label: 'DIAMOND',     locked: false, tag: 'obsidian · diamond' },
    { block: 2973,  label: 'HASH',        locked: false, tag: 'frost · hash' },
    { block: 3113,  label: 'SPIRAL',      locked: false, tag: 'ember · spiral' },
    { block: 9558,  label: 'VOID EYE',    locked: false, tag: 'aqua · void' },
    { block: 1775,  label: 'BURN',        locked: false, tag: 'aqua · burn' },
    { block: 8542,  label: 'HALO',        locked: false, tag: 'rust · halo' },
    { block: 8648,  label: 'SEALED',      locked: false, tag: 'chalk · sealed' },
    { block: 1221,  label: 'CALCITE',     locked: false, tag: 'chalk · spiral' },
    { block: 9517,  label: 'AURUM',       locked: false, tag: 'bronze · oracle' },
  ];

  const grid = document.getElementById('grid');
  for (const p of PICKS) {
    const t = UNATOM.fromBlock(p.block);
    const svg = UNATOM.svg(t);
    const a = document.createElement('a');
    a.href = '../pfp/?block=' + p.block;
    a.className = 'tile' + (p.locked ? ' locked' : '');
    a.innerHTML =
      '<div class="badge">' + (p.locked ? '◇ locked' : '◇ curated') + '</div>' +
      '<div class="frame">' + svg + '</div>' +
      '<div class="meta">' +
        '<span class="blk">#' + p.block.toLocaleString() + ' · ' + p.label + '</span>' +
        '<span class="tag">' + p.tag + '</span>' +
      '</div>';
    grid.appendChild(a);
  }
</script>

</body>
</html>
