<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0a0a0c">
<title>NAT READY? · UNATOMS</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='5' fill='%23f0962d'/%3E%3Ccircle cx='12' cy='10' r='2.5' fill='%23fff'/%3E%3C/svg%3E">
<style>
  :root{
    --bg:#0a0a0c;
    --ink:#f3eee3;
    --bone:#f3eee3;
    --paper:#f5f0e2;
    --orange:#f0962d;
    --cyan:#5dd0e3;
    --green:#7dcf5b;
    --pink:#f17d8e;
    --warm:#f9bc4f;
    --muted:rgba(243,238,227,0.5);
    --line:rgba(243,238,227,0.12);
    --vh:100vh;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{-webkit-text-size-adjust:100%}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);overscroll-behavior:none}
  body{
    font-family:-apple-system,system-ui,Segoe UI,Roboto,sans-serif;
    min-height:100vh;
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:max(8px,env(safe-area-inset-top)) 12px max(12px,env(safe-area-inset-bottom));
    touch-action:manipulation;
    -webkit-user-select:none;user-select:none;
  }

  /* === CHAIN STRIP === */
  .chain{
    display:flex;gap:8px;
    width:100%;max-width:480px;
    justify-content:space-between;
  }
  .chip{
    display:inline-flex;align-items:center;gap:6px;
    font:600 10.5px/1 ui-monospace,SF Mono,Menlo,monospace;
    letter-spacing:.14em;text-transform:uppercase;
    padding:7px 11px;
    background:rgba(243,238,227,.06);
    border:1px solid var(--line);
    border-radius:999px;
    color:var(--ink);
  }
  .chip .lbl{opacity:.55;font-weight:500}
  .chip .dot{width:6px;height:6px;border-radius:50%;background:#666;display:inline-block}
  .chip[data-live="true"] .dot{background:var(--green);box-shadow:0 0 8px var(--green);animation:livepulse 1.6s ease-in-out infinite}
  .chip[data-live="false"] .dot{background:#c75;opacity:.7}
  @keyframes livepulse{50%{opacity:.45}}

  .chip.weather[data-v="calm"]{color:var(--cyan)}
  .chip.weather[data-v="crowded"]{color:var(--warm)}
  .chip.weather[data-v="spicy"]{color:var(--orange)}
  .chip.weather[data-v="screaming"]{color:var(--pink);border-color:rgba(241,125,142,.35);animation:scream 0.8s ease-in-out infinite alternate}
  @keyframes scream{to{box-shadow:0 0 10px rgba(241,125,142,.4)}}

  /* === STAGE === */
  .stage{
    width:100%;max-width:480px;
    display:flex;flex-direction:column;align-items:center;
    flex:1;justify-content:flex-start;
  }

  /* === PORTRAIT === */
  .portrait-wrap{
    position:relative;
    width:min(78vw,360px);
    aspect-ratio:1;
    margin:18px 0 6px;
    display:flex;align-items:center;justify-content:center;
    will-change:transform,filter;
  }
  .portrait-wrap svg{width:100%;height:100%;display:block;overflow:visible}
  .portrait-wrap.breathe{animation:breathe 3s ease-in-out infinite}
  .portrait-wrap.knocking{animation:tremor .42s steps(5)}
  .portrait-wrap.opened{animation:openburst .9s cubic-bezier(.2,.8,.3,1)}
  .portrait-wrap.idle{animation:idleSway 6s ease-in-out infinite}

  @keyframes idleSway{
    0%,100%{transform:translateY(0) rotate(0)}
    50%{transform:translateY(-3px) rotate(.3deg)}
  }
  @keyframes breathe{
    0%,100%{transform:scale(1)}
    50%{transform:scale(1.015)}
  }
  @keyframes tremor{
    0%,100%{transform:translate(0,0) rotate(0)}
    20%{transform:translate(-4px,1px) rotate(-.6deg)}
    40%{transform:translate(3px,-2px) rotate(.6deg)}
    60%{transform:translate(-3px,2px) rotate(-.4deg)}
    80%{transform:translate(4px,0) rotate(.4deg)}
  }
  @keyframes openburst{
    0%{transform:scale(1);filter:drop-shadow(0 0 0 transparent)}
    35%{transform:scale(1.07);filter:drop-shadow(0 0 36px rgba(240,150,45,.85))}
    70%{transform:scale(1.02);filter:drop-shadow(0 0 18px rgba(240,150,45,.4))}
    100%{transform:scale(1);filter:drop-shadow(0 0 0 transparent)}
  }

  .halo{
    position:absolute;inset:0;
    border-radius:50%;
    pointer-events:none;
    opacity:0;
    background:radial-gradient(circle at 50% 38%,rgba(240,150,45,.32),transparent 55%);
    transition:opacity .4s ease;
  }
  body.state-knock .halo{opacity:.4;animation:haloPulse 1.2s ease-in-out infinite}
  body.state-blinks .halo{opacity:.6;background:radial-gradient(circle at 50% 38%,rgba(93,208,227,.4),transparent 60%)}
  body.state-receipt .halo{opacity:.2;background:radial-gradient(circle at 50% 38%,rgba(125,207,91,.4),transparent 60%)}
  @keyframes haloPulse{50%{opacity:.18}}

  .ident{
    font:600 10.5px/1 ui-monospace,SF Mono,Menlo,monospace;
    letter-spacing:.2em;text-transform:uppercase;
    color:var(--muted);
    margin:6px 0 14px;text-align:center;
    min-height:12px;
  }

  /* === WHISPER === */
  .whisper{
    font:italic 17px/1.4 'Georgia','Times New Roman',serif;
    text-align:center;
    margin:0 0 18px;
    padding:0 14px;
    min-height:54px;
    max-width:380px;
    color:var(--ink);
    transition:opacity .25s;
  }
  .whisper.flash{animation:whisperIn .35s ease-out}
  .whisper .status{display:block;font-style:normal;font:600 15.5px/1.35 -apple-system,system-ui,sans-serif;letter-spacing:.005em;color:var(--ink);margin-bottom:3px}
  .whisper .voice{display:block;font-style:italic;font-size:15px;line-height:1.4;color:var(--muted)}
  .shuffle-chip{
    display:inline-flex;align-items:center;gap:7px;
    background:rgba(243,238,227,.06);
    color:var(--ink);
    border:1px dashed var(--line);
    border-radius:999px;
    padding:7px 14px;margin:-4px 0 10px;
    font:600 10.5px/1 ui-monospace,monospace;letter-spacing:.16em;text-transform:uppercase;
    cursor:pointer;
    transition:opacity .15s,background .15s;
  }
  .shuffle-chip:active{opacity:.6;background:rgba(243,238,227,.12)}
  .shuffle-chip .ico{font-size:13px;display:inline-block;line-height:1}
  .help-line{
    text-align:center;
    font:500 11px/1.4 ui-monospace,monospace;
    letter-spacing:.12em;text-transform:uppercase;
    color:var(--muted);
    margin:2px 0 4px;
    max-width:320px;
  }

  /* === POSTER OVERLAY (camera-roll save) === */
  .poster-overlay{
    position:fixed;inset:0;
    background:rgba(0,0,0,.94);
    display:none;
    align-items:center;justify-content:center;
    flex-direction:column;
    z-index:9999;
    padding:max(16px,env(safe-area-inset-top)) 16px max(16px,env(safe-area-inset-bottom));
    overflow-y:auto;
  }
  .poster-overlay.show{display:flex}
  .poster-overlay img{
    max-width:100%;max-height:72vh;
    border-radius:18px;
    box-shadow:0 14px 50px rgba(0,0,0,.7);
    -webkit-touch-callout:default;  /* iOS: enable long-press menu */
    -webkit-user-select:auto;user-select:auto;
    pointer-events:auto;
  }
  .poster-overlay .hint{
    margin-top:18px;color:var(--ink);
    font:600 13px/1.5 -apple-system,system-ui,sans-serif;
    text-align:center;letter-spacing:.04em;
    max-width:340px;
  }
  .poster-overlay .hint b{color:var(--orange);font-weight:700}
  .poster-overlay .row{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap;justify-content:center}
  .poster-overlay .row button,
  .poster-overlay .row a{
    background:none;border:1px solid rgba(243,238,227,.3);
    color:var(--ink);
    padding:11px 22px;border-radius:999px;
    font:600 11px/1 ui-monospace,monospace;
    letter-spacing:.16em;text-transform:uppercase;
    cursor:pointer;text-decoration:none;
  }
  .poster-overlay .row .primary{
    background:var(--orange);color:#0a0a0c;border-color:var(--orange);
  }
  @keyframes whisperIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

  /* === ACTION === */
  .action{
    width:100%;max-width:460px;
    display:flex;flex-direction:column;align-items:center;gap:12px;
    margin-bottom:18px;
  }
  .pill{
    font:700 17px/1 ui-monospace,SF Mono,Menlo,monospace;
    letter-spacing:.16em;text-transform:uppercase;
    background:var(--bone);color:#0a0a0c;
    border:none;border-radius:999px;
    padding:18px 28px;
    cursor:pointer;
    width:100%;max-width:340px;
    min-height:60px;
    box-shadow:0 0 0 1px rgba(243,238,227,.5),0 6px 22px rgba(0,0,0,.45);
    transition:transform .08s,box-shadow .15s,background .15s,color .15s;
    -webkit-appearance:none;appearance:none;
  }
  .pill:active{transform:scale(.96)}
  .pill[disabled]{opacity:.4;cursor:not-allowed;background:rgba(243,238,227,.18);color:var(--muted);box-shadow:none}
  .pill.hot{background:var(--orange);color:#1a1207}
  .pill.cool{background:var(--cyan);color:#08191c}
  .pill.again{background:var(--green);color:#0b1707;animation:hover 2.2s ease-in-out infinite}
  @keyframes hover{50%{transform:translateY(-3px);box-shadow:0 0 0 1px rgba(125,207,91,.5),0 12px 28px rgba(125,207,91,.3)}}

  .pill.big{font-size:22px;padding:22px 28px;min-height:72px}

  .ghost{
    background:transparent;border:none;color:var(--muted);
    font:500 12px/1 ui-monospace,SF Mono,Menlo,monospace;
    letter-spacing:.14em;text-transform:uppercase;
    padding:8px 16px;cursor:pointer;
  }
  .ghost:active{color:var(--ink)}

  /* === CAPACITY === */
  .cap-row{
    width:100%;max-width:340px;
    display:flex;flex-direction:column;gap:6px;
  }
  .cap-meta{
    display:flex;justify-content:space-between;
    font:600 10.5px/1 ui-monospace,monospace;
    letter-spacing:.16em;text-transform:uppercase;
    color:var(--muted);
  }
  .cap-meta .num{color:var(--ink)}
  .cap{
    height:10px;border-radius:999px;
    background:rgba(243,238,227,.08);
    border:1px solid var(--line);
    overflow:hidden;
  }
  .cap-fill{
    height:100%;width:0;
    background:linear-gradient(90deg,var(--cyan) 0%,var(--warm) 60%,var(--orange) 90%,var(--pink) 100%);
    transition:width .4s cubic-bezier(.4,.6,.2,1);
  }
  .cap-fill.full{box-shadow:0 0 12px var(--pink)}

  /* === CRUMBS === */
  .crumbs{
    display:flex;gap:8px;
    width:100%;max-width:460px;
    overflow-x:auto;overflow-y:visible;
    padding:14px 12px 18px;
    scroll-snap-type:x mandatory;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  .crumbs::-webkit-scrollbar{display:none}
  .crumb{
    flex:0 0 auto;
    scroll-snap-align:center;
    background:var(--bone);color:#0a0a0c;
    border-radius:18px;
    padding:10px 12px;
    min-width:70px;
    text-align:center;
    cursor:pointer;
    user-select:none;
    border:2px solid rgba(0,0,0,.14);
    font:700 10.5px/1.2 ui-monospace,SF Mono,Menlo,monospace;
    letter-spacing:.08em;text-transform:uppercase;
    display:flex;flex-direction:column;align-items:center;gap:4px;
    transition:transform .12s,opacity .15s;
    position:relative;
    will-change:transform;
  }
  .crumb .vb{font-size:14px;letter-spacing:.02em;font-weight:800}
  .crumb:active{transform:scale(.88)}
  .crumb.hot{background:var(--warm);border-color:#c97a14}
  .crumb.cold{background:#bce3ea;border-color:#3a8da1;color:#08222a}
  .crumb.fat{background:#f1747c;border-color:#c43846;color:#fff;font-size:11.5px}
  .crumb.dust{background:rgba(243,238,227,.22);border-color:rgba(243,238,227,.12);color:var(--muted)}
  .crumb.diamond{
    background:linear-gradient(135deg,#fff 0%,#b9f0ea 55%,#fff 100%);
    border-color:#5fa1a8;
    box-shadow:0 0 10px rgba(143,224,228,.4);
  }
  .crumb.fly{animation:flyToMouth 360ms cubic-bezier(.5,-0.05,.4,1) forwards;pointer-events:none;z-index:5}
  .crumb.reject{animation:rejectShake 520ms ease-out forwards;pointer-events:none;z-index:5}
  @keyframes flyToMouth{
    20%{transform:translate(calc(var(--fx)*.15),calc(var(--fy)*.05)) scale(1.1)}
    100%{transform:translate(var(--fx),var(--fy)) scale(.18);opacity:0}
  }
  @keyframes rejectShake{
    0%{transform:translate(0,0)}
    15%{transform:translate(-12px,0) rotate(-12deg)}
    30%{transform:translate(11px,0) rotate(11deg)}
    45%{transform:translate(-9px,0) rotate(-7deg)}
    60%{transform:translate(8px,0) rotate(7deg)}
    100%{transform:translate(0,150px) scale(.4) rotate(20deg);opacity:0}
  }

  /* === KNOCK === */
  .knock-meta{
    font:600 11px/1 ui-monospace,monospace;
    letter-spacing:.18em;text-transform:uppercase;
    color:var(--muted);
    display:flex;gap:10px;
  }
  .knock-meta .num{color:var(--orange);font-weight:800}

  /* === BLINKS === */
  .blinks{
    display:flex;gap:14px;
    margin:8px 0;justify-content:center;
  }
  .blink-dot{
    width:14px;height:14px;border-radius:50%;
    border:1.5px solid rgba(243,238,227,.3);
    background:transparent;
    transition:all .35s ease-out;
  }
  .blink-dot.on{background:var(--cyan);border-color:var(--cyan);box-shadow:0 0 10px var(--cyan)}
  .blink-dot.deep{background:#fff;border-color:#fff;box-shadow:0 0 24px rgba(255,255,255,.85),0 0 48px rgba(240,150,45,.5)}

  /* === RECEIPT === */
  .receipt{
    position:relative;
    background:var(--paper);color:#181410;
    width:100%;max-width:360px;
    padding:22px 24px 24px;
    font-family:'Georgia','Times New Roman',serif;
    border-radius:3px;
    box-shadow:0 22px 60px rgba(0,0,0,.55),0 0 0 1px rgba(0,0,0,.2);
    margin-top:4px;
    transform:rotate(-.6deg);
    animation:rcptDrop .55s cubic-bezier(.2,.85,.3,1.05);
  }
  @keyframes rcptDrop{
    from{transform:translateY(-30px) rotate(-3deg);opacity:0}
    to{transform:rotate(-.6deg);opacity:1}
  }
  .receipt::before,.receipt::after{
    content:'';position:absolute;left:0;right:0;height:10px;
    background:
      radial-gradient(circle at 6px 5px,var(--bg) 4px,transparent 4.5px) 0 0/12px 10px,
      var(--paper);
  }
  .receipt::before{top:-9px;mask:linear-gradient(180deg,transparent 0,#000 70%);-webkit-mask:linear-gradient(180deg,transparent 0,#000 70%)}
  .receipt::after{bottom:-9px;transform:scaleY(-1);mask:linear-gradient(180deg,transparent 0,#000 70%);-webkit-mask:linear-gradient(180deg,transparent 0,#000 70%)}

  .rcpt-hd{text-align:center;border-bottom:1px dashed rgba(0,0,0,.3);padding-bottom:10px;margin-bottom:12px}
  .rcpt-hd h2{font:800 17px/1.1 'Georgia',serif;letter-spacing:.22em;margin:0 0 4px}
  .rcpt-hd .sub{font:11px/1 ui-monospace,monospace;letter-spacing:.16em;text-transform:uppercase;color:rgba(0,0,0,.55)}

  .rcpt-row{display:flex;justify-content:space-between;font:14px/1.5 'Georgia',serif;padding:2px 0}
  .rcpt-row .l{color:rgba(0,0,0,.5);text-transform:lowercase}
  .rcpt-row .v{font-weight:700;text-align:right}

  .verdict{
    text-align:center;font:800 26px/1.05 'Georgia',serif;
    margin:14px 0 4px;letter-spacing:.02em;
  }
  .diag{
    font:italic 14px/1.55 'Georgia',serif;
    text-align:center;
    margin:6px 0 12px;
    color:#181410;
  }
  .serial{
    text-align:center;
    font:11px/1.3 ui-monospace,monospace;
    letter-spacing:.18em;
    color:rgba(0,0,0,.55);
    text-transform:uppercase;
    border-top:1px dashed rgba(0,0,0,.3);
    padding-top:8px;margin-top:8px;
  }
  .stamp{
    position:absolute;top:16px;right:16px;
    width:58px;height:58px;border-radius:50%;
    border:2px solid currentColor;
    display:flex;align-items:center;justify-content:center;text-align:center;
    font:800 9px/1.05 ui-monospace,monospace;letter-spacing:.08em;
    transform:rotate(-12deg);
    text-transform:uppercase;
  }
  .stamp.locked{color:#c46410;border-color:#c46410;background:rgba(196,100,16,.08)}
  .stamp.lost{color:#666;border-color:#666;background:rgba(0,0,0,.04)}

  /* === MARK === */
  .mark{
    font:600 9.5px/1 ui-monospace,monospace;
    letter-spacing:.24em;text-transform:uppercase;
    color:rgba(243,238,227,.32);
    padding:14px 0 4px;
  }
  .mark a{color:inherit;text-decoration:none}

  /* === BOOT === */
  .boot{
    position:fixed;inset:0;
    display:flex;align-items:center;justify-content:center;
    background:var(--bg);z-index:50;
    flex-direction:column;gap:14px;
    font:italic 16px/1 'Georgia',serif;color:var(--muted);
  }
  .boot .dotrow{display:flex;gap:8px}
  .boot .b{width:9px;height:9px;border-radius:50%;background:var(--muted);animation:bootblink 1.2s ease-in-out infinite}
  .boot .b:nth-child(2){animation-delay:.15s}
  .boot .b:nth-child(3){animation-delay:.3s}
  @keyframes bootblink{50%{opacity:.18}}

  @media (min-width:540px){
    body{padding:24px 16px}
    .portrait-wrap{width:min(64vw,380px)}
    .whisper{font-size:18px}
  }
</style>
</head>
<body class="state-ready">
  <div class="boot" id="boot">
    <div class="dotrow"><div class="b"></div><div class="b"></div><div class="b"></div></div>
    <div>summoning matter…</div>
  </div>

  <header class="chain">
    <div class="chip"><span class="dot"></span><span class="lbl">newest block</span><span id="tipNum">—</span></div>
    <div class="chip weather" id="weatherPill" data-v="—"><span class="lbl">bitcoin</span><span id="weatherTxt">—</span></div>
  </header>

  <main class="stage">
    <div class="portrait-wrap idle" id="portraitWrap">
      <div class="halo"></div>
      <div id="portrait" aria-label="UNATOM"></div>
    </div>

    <div class="ident" id="ident">UNATOM · —</div>

    <p class="whisper" id="whisper">—</p>

    <section class="action" id="action"></section>
  </main>

  <footer class="mark">UNATOMS · <a href="https://unatom.fun" target="_blank" rel="noopener">unatom.fun</a> · <a href="https://x.com/takedmt" target="_blank" rel="noopener">@takedmt</a></footer>

<script src="./unatom-render.js"></script>
<script>
'use strict';

const STATE = {
  step: 'ready',
  unatom: null,       // base traits
  live: {},           // gameplay overrides applied to the portrait
  block: null,
  weather: null,
  crumbs: [],
  belly: [],
  rejected: [],
  knocks: 0,
  knockGoal: 0,
  leaks: 0,
  blinks: 0,
  receipt: null,
  patched: false,
};
window.STATE = STATE;

const $ = (id) => document.getElementById(id);

// ============================================================================
// WEATHER
// ============================================================================

async function fetchWeather() {
  try {
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), 5000);
    const [tip, fees, mp, blks] = await Promise.all([
      fetch('https://mempool.space/api/blocks/tip/height', {signal: ctrl.signal}).then(r => r.text()),
      fetch('https://mempool.space/api/v1/fees/recommended', {signal: ctrl.signal}).then(r => r.json()),
      fetch('https://mempool.space/api/mempool', {signal: ctrl.signal}).then(r => r.json()),
      fetch('https://mempool.space/api/v1/fees/mempool-blocks', {signal: ctrl.signal}).then(r => r.json()),
    ]);
    clearTimeout(t);
    const out = {
      tip: parseInt(tip, 10),
      feeFast: fees.fastestFee,
      feeHalf: fees.halfHourFee,
      feeHour: fees.hourFee,
      mempoolCount: mp.count,
      mempoolVsize: mp.vsize,
      projectedBlocks: blks.length,
      live: true,
    };
    out.verdict = verdictFromWeather(out);
    return out;
  } catch (e) {
    const tip = 904200 + Math.floor(Math.random() * 8000);
    const feeFast = 8 + Math.floor(Math.random() * 60);
    const projected = 2 + Math.floor(Math.random() * 6);
    return {
      tip, feeFast, feeHalf: Math.max(4, feeFast - 4), feeHour: Math.max(2, feeFast - 8),
      mempoolCount: 20000 + Math.floor(Math.random() * 130000),
      mempoolVsize: 5e7,
      projectedBlocks: projected,
      live: false,
      verdict: verdictFromWeather({feeFast, projectedBlocks: projected}),
    };
  }
}

function verdictFromWeather(w) {
  if (w.feeFast >= 200 || w.projectedBlocks >= 8) return 'screaming';
  if (w.feeFast >= 60  || w.projectedBlocks >= 5) return 'spicy';
  if (w.feeFast >= 20  || w.projectedBlocks >= 2) return 'crowded';  return 'calm';
}
// Plain-English label for each verdict. Use this ANYWHERE the player sees the
// network state — header pill, receipt row, share line. Internal `verdict` codes
// (calm/crowded/spicy/screaming) stay as the canonical state for game logic so the
// CSS scream-animation selector on data-v="screaming" still fires correctly.
function verdictLabel(v) {
  return ({ calm: 'quiet', crowded: 'busy', spicy: 'pricey', screaming: 'packed' })[v] || 'live';
}

function paintWeather(w) {
  $('tipNum').textContent = '#' + w.tip.toLocaleString();
  $('weatherTxt').textContent = verdictLabel(w.verdict);
  const pill = $('weatherPill');
  pill.dataset.v = w.verdict;
  $('weatherPill').setAttribute('data-live', w.live ? 'true' : 'false');
  document.querySelectorAll('.chip').forEach(c => c.setAttribute('data-live', w.live ? 'true' : 'false'));
}

// ============================================================================
// SUMMON + RENDER
// ============================================================================

function summon(h) {
  STATE.block = h;
  STATE.unatom = UNATOM.fromBlock(h);
  STATE.live = {};
  STATE.crumbs = [];
  STATE.belly = [];
  STATE.rejected = [];
  STATE.knocks = 0;
  STATE.knockGoal = 0;
  STATE.leaks = 0;
  STATE.blinks = 0;
  STATE.receipt = null;
  STATE.patched = false;
  STATE.step = 'ready';
  setBodyState('ready');
  renderPortrait();
  paintIdent();
  paintAction();
}

function renderPortrait() {
  const opts = Object.assign({}, STATE.unatom, STATE.live);
  $('portrait').innerHTML = UNATOM.svg(opts);
}

function setLive(key, val, ms) {
  STATE.live[key] = val;
  renderPortrait();
  if (ms > 0) {
    clearTimeout(STATE['_t_' + key]);
    STATE['_t_' + key] = setTimeout(() => {
      delete STATE.live[key];
      renderPortrait();
    }, ms);
  }
}

function setBodyState(s) {
  document.body.className = 'state-' + s;
  STATE.step = s;
  const pw = $('portraitWrap');
  pw.classList.remove('idle','breathe','knocking','opened');
  if (s === 'ready' || s === 'feed') pw.classList.add('idle');
  if (s === 'blinks' || s === 'receipt') pw.classList.add('breathe');
}

function paintIdent() {
  const u = STATE.unatom;
  const cat = UNATOM.CATEGORIES.find(c => c.els.includes(u.sym));
  const catLbl = cat ? cat.label.toLowerCase() : 'matter';
  $('ident').textContent = `unatom #${STATE.block.toLocaleString()} of 10,080 · ${u.sym} · ${catLbl}`;
}

function flash(msg, voice) {
  const w = $('whisper');
  if (voice) {
    w.innerHTML = '<span class="status">' + esc(msg) + '</span><span class="voice">' + esc(voice) + '</span>';
  } else {
    w.textContent = msg;
  }
  w.classList.remove('flash');
  void w.offsetWidth;
  w.classList.add('flash');
}
function esc(s) {
  return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

function haptic(ms = 12) {
  if (navigator.vibrate) try { navigator.vibrate(ms); } catch (e) {}
}

// ============================================================================
// STAGE DISPATCH
// ============================================================================

function paintAction() {
  const root = $('action');
  root.innerHTML = '';
  if (STATE.step === 'ready')   return paintReady(root);
  if (STATE.step === 'feed')    return paintFeed(root);
  if (STATE.step === 'knock')   return paintKnock(root);
  if (STATE.step === 'blinks')  return paintBlinks(root);
  if (STATE.step === 'receipt') return paintReceipt(root);
}

// ============================================================================
// STEP 1 — READY
// ============================================================================

function paintReady(root) {
  flash(chainGreeting(), traitGreeting());

  const shuf = document.createElement('button');
  shuf.className = 'shuffle-chip';
  shuf.innerHTML = '<span class="ico">⟳</span><span>try a different unatom</span>';
  shuf.onclick = () => { haptic(8); summon(rollSeriesBlock()); };
  root.appendChild(shuf);

  const help = document.createElement('div');
  help.className = 'help-line';
  help.textContent = 'adopt a unatom. feed the chain. keep the receipt.';
  root.appendChild(help);

  const btn = document.createElement('button');
  btn.className = 'pill big';
  btn.textContent = 'NAT READY?';
  btn.onclick = () => { haptic(20); enterFeed(); };
  root.appendChild(btn);
}

function chainGreeting() {
  const v = STATE.weather.verdict;
  // DMT thesis: blocks are mostly empty in 2026 — the chain needs matter to survive.
  // Every crumb you commit is fuel for miners, not a problem to fit around.
  return ({
    calm:      'blocks are empty. the chain is hungry for your matter.',
    crowded:   'matter is flowing right now. your crumbs ride with it.',
    spicy:     'fees are strong. matter pays the miners.',
    screaming: 'block is full of matter. yours may catch the next round.',
  })[v] || 'the chain is open.';
}

function traitGreeting() {
  const u = STATE.unatom;
  // First-person, plain meaning. Tells the player WHAT this character does.
  if (u.thirdEye === 'diamond')   return "I'm a diamond. I find blocks fast.";
  if (u.thirdEye === 'burn')      return "I run hot. feed me orange ones.";
  if (u.thirdEye === 'frost')     return "I run cold. blue crumbs suit me.";
  if (u.thirdEye === 'sealed')    return "I'm sealed shut. expect extra taps.";
  if (u.thirdEye === 'genesis')   return "I'm a genesis. one tap should do it.";
  if (u.thirdEye === 'void')      return "I'm a void. anything can happen.";
  if (u.thirdEye === 'oracle')    return "I'm an oracle. I see ahead — fewer taps.";
  if (u.thirdEye === 'halo')      return "I've got a halo. matter comes to me.";
  if (u.thirdEye === 'closedEye') return "my eye is closed. tap harder to wake me.";
  if (u.scheme === 'ember')       return "I'm an ember. I burn the tiny crumbs on contact.";
  if (u.scheme === 'frost')       return "I'm frost. cold crumbs love me.";
  if (u.scheme === 'void')        return "I'm void. my receipt reads strange.";
  if (u.swagKind === 'minerMark' || u.swagKind === 'difficultyBadge') return "I've got the miner's mark. harder to crack me open.";
  if (u.swagKind === 'patchBorder' || u.swagKind === 'tinyBandage')   return "I've got a patch. saves my first overflow.";
  return "I'm ready. tap to feed the chain.";
}

// ============================================================================
// STEP 2 — FEED
// ============================================================================

function enterFeed() {
  STATE.step = 'feed';
  setBodyState('feed');
  setLive('mood', 'curious');
  rollCrumbs();
  paintAction();
}

function rollCrumbs() {
  const w = STATE.weather;
  const v = w.verdict;
  const count = ({ calm: 6, crowded: 8, spicy: 9, screaming: 10 })[v] || 7;
  const dist = ({
    calm:      { hot: .25, cold: .35, fat: .05, dust: .30, diamond: .05 },
    crowded:   { hot: .20, cold: .35, fat: .15, dust: .25, diamond: .05 },
    spicy:     { hot: .42, cold: .18, fat: .15, dust: .20, diamond: .05 },
    screaming: { hot: .30, cold: .25, fat: .25, dust: .15, diamond: .05 },
  })[v] || { hot: .25, cold: .30, fat: .15, dust: .25, diamond: .05 };
  const sizeRanges = { hot: [10,18], cold: [14,22], fat: [38,58], dust: [3,7], diamond: [10,16] };

  STATE.crumbs = [];
  for (let i = 0; i < count; i++) {
    const r = Math.random();
    let kind = 'cold', acc = 0;
    for (const [k,p] of Object.entries(dist)) { acc += p; if (r < acc) { kind = k; break; } }
    const [lo, hi] = sizeRanges[kind];
    const size = Math.round(lo + Math.random() * (hi - lo));
    STATE.crumbs.push({ id: 'c' + i, kind, size });
  }
  // shuffle
  for (let i = STATE.crumbs.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const tmp = STATE.crumbs[i]; STATE.crumbs[i] = STATE.crumbs[j]; STATE.crumbs[j] = tmp;
  }
}

function paintFeed(root) {
  const used = STATE.belly.reduce((s, c) => s + (c.kept ?? c.size), 0);
  const cap = 100;
  const pct = Math.min(100, (used / cap) * 100);
  const canKnock = STATE.belly.length > 0;
  // First entry shows the rule; later actions show reactions
  if (STATE.belly.length === 0 && STATE.rejected.length === 0) {
    flash('tap a crumb to add it to the block.', 'block has 100 spaces. big ones may not fit.');
  }

  root.innerHTML =
    '<div class="cap-row">' +
      '<div class="cap-meta"><span>block space</span><span class="num">' + used + ' / ' + cap + ' vb</span></div>' +
      '<div class="cap"><div class="cap-fill' + (pct >= 90 ? ' full' : '') + '" style="width:' + pct + '%"></div></div>' +
    '</div>' +
    '<div class="crumbs" id="crumbsRow"></div>' +
    '<button class="pill hot" id="goKnock" ' + (canKnock ? '' : 'disabled') + '>' +
      (canKnock ? 'TRY TO SEAL THE BLOCK →' : 'pick at least one crumb') +
    '</button>' +
    '<button class="ghost" id="skipFeed">' + (canKnock ? '— or just go with these —' : '') + '</button>';

  const row = $('crumbsRow');
  if (STATE.crumbs.length === 0) {
    row.innerHTML = '<div class="cap-meta" style="margin:6px auto;color:var(--muted)">waiting room is empty.</div>';
  }
  STATE.crumbs.forEach(c => {
    const el = document.createElement('div');
    el.className = 'crumb ' + c.kind;
    el.dataset.id = c.id;
    const glyph = ({ hot: '● hot', cold: '○ cold', fat: '■ fat', dust: '· dust', diamond: '◈ dmnd' })[c.kind];
    el.innerHTML = '<span>' + glyph + '</span><span class="vb">' + c.size + 'vb</span>';
    el.onclick = () => tryEat(c.id);
    row.appendChild(el);
  });

  $('goKnock').onclick = () => { if (canKnock) { haptic(15); enterKnock(); } };
  if (canKnock) $('skipFeed').onclick = () => { haptic(8); enterKnock(); };
}

function tryEat(id) {
  const idx = STATE.crumbs.findIndex(c => c.id === id);
  if (idx < 0) return;
  const c = STATE.crumbs[idx];
  const u = STATE.unatom;
  const used = STATE.belly.reduce((s, x) => s + (x.kept ?? x.size), 0);
  const cap = 100;

  let kept = c.size;

  // trait: minerFang / mouth fang bites fat smaller
  if (c.kind === 'fat' && (u.swagKind === 'minerMark' || u.mouthKind === 'fangs' || u.mouthKind === 'fang')) {
    kept = Math.round(c.size / 2);
  }
  // trait: ember/fire auto-burns dust
  if (c.kind === 'dust' && (u.scheme === 'ember' || u.nature === 'fire')) {
    STATE.rejected.push(Object.assign({ why: 'burnt' }, c));
    STATE.crumbs.splice(idx, 1);
    flyOut(id, 'reject');
    flash('I burned the dust on contact.', 'one less to deal with.');
    setLive('mood', 'wonder', 280);
    setTimeout(() => paintAction(), 380);
    return;
  }
  // diamond always fits (small overflow grace)
  if (c.kind === 'diamond' && used + kept <= cap + 12) {
    return accept(c, kept, idx, 'diamonds always fit.');
  }

  if (used + kept > cap) {
    // Trait: patch repairs first reject
    if (!STATE.patched && (u.swagKind === 'patchBorder' || u.swagKind === 'tinyBandage')) {
      STATE.patched = true;
      flash('my patch saved that one.', 'free space.');
      return accept(c, kept, idx, 'patched in. fits now.');
    }
    STATE.rejected.push(Object.assign({ why: 'too big' }, c));
    STATE.crumbs.splice(idx, 1);
    flyOut(id, 'reject');
    flash(sample([
      'caught the next block.',
      'this one waits one round.',
      'next block has room.',
      'queued for the next one.',
    ]), 'UNAT gonna fit.');
    setLive('mood', 'sideEye', 320);
    setTimeout(() => paintAction(), 480);
    haptic(28);
    return;
  }

  // accept
  const phrase = ({
    hot:     'added! that one was hot.',
    cold:    'added. a cold one settled.',
    fat:     kept < c.size ? 'I bit it smaller — it fits.' : 'tight squeeze. it fit.',
    dust:    'a tiny one. in.',
    diamond: 'diamonds always fit.',
  })[c.kind] || 'added.';
  accept(c, kept, idx, phrase);
}

function accept(c, kept, idx, phrase) {
  STATE.belly.push(Object.assign({ kept }, c));
  STATE.crumbs.splice(idx, 1);
  flyOut(c.id, 'fly');
  flash(phrase, 'NAT gonna fit.');
  setLive('mood', 'wonder', 260);
  haptic(12);
  setTimeout(() => paintAction(), 360);
}

function flyOut(id, cls) {
  const el = document.querySelector('.crumb[data-id="' + id + '"]');
  if (!el) return;
  const portrait = $('portraitWrap');
  const rect = el.getBoundingClientRect();
  const targ = portrait.getBoundingClientRect();
  const dx = (targ.left + targ.width / 2)  - (rect.left + rect.width / 2);
  const dy = (targ.top  + targ.height * .58) - (rect.top  + rect.height / 2);
  el.style.setProperty('--fx', dx + 'px');
  el.style.setProperty('--fy', dy + 'px');
  el.classList.add(cls);
}

function sample(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ============================================================================
// STEP 3 — KNOCK
// ============================================================================

function enterKnock() {
  STATE.step = 'knock';
  setBodyState('knock');
  setLive('mood', 'lockedIn');

  const v = STATE.weather.verdict;
  let goal = ({ calm: 3, crowded: 5, spicy: 7, screaming: 9 })[v] || 5;
  const u = STATE.unatom;
  if (u.thirdEye === 'diamond')  goal = Math.max(1, goal - 2);
  if (u.thirdEye === 'oracle')   goal = Math.max(1, goal - 1);
  if (u.thirdEye === 'genesis')  goal = 1;
  if (u.thirdEye === 'sealed')   goal += 3;
  if (u.thirdEye === 'closedEye') goal += 2;
  if (u.swagKind === 'difficultyBadge') goal += 1;
  STATE.knockGoal = goal;
  STATE.knocks = 0;
  STATE.leaks = 0;
  paintAction();
}

function paintKnock(root) {
  flash('tap to guess the block hash.', 'miners do this billions of times — you only need a few.');
  root.innerHTML =
    '<div class="knock-meta">taps <span class="num" id="knockN">0</span></div>' +
    '<button class="pill hot big" id="knockBtn">TAP TO TRY</button>' +
    '<button class="ghost" id="rerun">— start over —</button>';
  $('knockBtn').onclick = () => doKnock();
  $('rerun').onclick = () => { haptic(8); runAgain(); };
}

function doKnock() {
  STATE.knocks++;
  $('knockN').textContent = STATE.knocks;

  const pw = $('portraitWrap');
  pw.classList.remove('knocking');
  void pw.offsetWidth;
  pw.classList.add('knocking');
  haptic(22);

  const u = STATE.unatom;
  if ((u.drip === 'brokenWick' || u.drip === 'splitDrip') && Math.random() < 0.4) {
    STATE.leaks++;
    flash('my wick dripped — that tap missed.', 'try again.');
  } else {
    flash(sample([
      'no match.',
      'close. keep tapping.',
      'almost there.',
      'not yet.',
      'one more guess.',
      'try again.',
    ]), 'UNAT ready yet?');
  }

  if (STATE.knocks >= STATE.knockGoal) {
    // SUCCESS BURST
    setTimeout(() => {
      const upgrade = { open: 'oracle', closedEye: 'open', sealed: 'open',
                         halo: 'oracle', aperture: 'oracle', frost: 'diamond' };
      const nextEye = upgrade[u.thirdEye] || u.thirdEye;
      STATE.live.mood = 'wonder';
      STATE.live.thirdEye = nextEye;
      renderPortrait();
      pw.classList.add('opened');
      flash('match found! my eye opened.', 'NAT made contact.');
      haptic(60);
      setTimeout(() => enterBlinks(), 1100);
    }, 220);
  }
}

// ============================================================================
// STEP 4 — SIX BLINKS
// ============================================================================

function enterBlinks() {
  STATE.step = 'blinks';
  setBodyState('blinks');
  STATE.live.mood = 'blissed';
  renderPortrait();
  paintAction();
}

function paintBlinks(root) {
  const cells = [0,1,2,3,4,5].map(i => '<div class="blink-dot" data-i="' + i + '"></div>').join('');
  root.innerHTML = '<div class="blinks" id="blinkRow">' + cells + '</div>';
  STATE.blinks = 0;

  // Bitcoin counts a payment "deep settled" after 6 confirmations.
  const lines = [
    ['1 of 6.', 'first confirmation.'],
    ['2 of 6.', 'getting more solid.'],
    ['3 of 6.', 'halfway to deep.'],
    ['4 of 6.', 'almost there.'],
    ['5 of 6.', 'one more confirmation.'],
    ['6 of 6.', 'deep matter. NAT locked.'],
  ];

  const dots = root.querySelectorAll('.blink-dot');

  const tick = () => {
    if (STATE.blinks >= 6) {
      setTimeout(enterReceipt, 700);
      return;
    }
    const i = STATE.blinks;
    dots[i].classList.add('on');
    if (i === 5) dots[i].classList.add('deep');
    flash(lines[i][0], lines[i][1]);
    haptic(i === 5 ? 50 : 14);
    STATE.blinks++;
    setTimeout(tick, 740);
  };
  setTimeout(tick, 400);
}

// ============================================================================
// STEP 5 — RECEIPT
// ============================================================================

function enterReceipt() {
  STATE.step = 'receipt';
  setBodyState('receipt');
  STATE.live.mood = 'soft';
  renderPortrait();
  buildReceipt();
  paintAction();
}

function buildReceipt() {
  const u = STATE.unatom;
  const w = STATE.weather;
  const ate = STATE.belly.length;
  const eaten = STATE.belly.reduce((s, c) => s + (c.kept ?? c.size), 0);
  const rejected = STATE.rejected.length;
  const leftovers = STATE.crumbs.length;
  const verdict =
    ate >= 5 ? 'NAT made it.' :
    ate >= 3 ? 'UNAT settled.' :
    ate >= 1 ? 'tight squeeze. NAT made it small.' :
               'cold pull. catch the next one.';
  const wickState = STATE.leaks === 0 ? 'stable' : (STATE.leaks === 1 ? 'leaked once' : 'leaked ' + STATE.leaks + 'x');
  const hash = (STATE.knocks * 7 + ate * 13 + rejected * 5 + STATE.leaks * 3) & 0xFF;
  const serial = 'R-' + String(STATE.block).slice(-4) + '-' + u.sym + '-' + hash.toString(16).padStart(2,'0').toUpperCase();
  STATE.receipt = { ate, eaten, rejected, leftovers, verdict, wickState, serial, diag: diagnosis() };
}

function diagnosis() {
  const u = STATE.unatom, w = STATE.weather;
  const lines = [];
  const v = w.verdict;
  if (v === 'screaming')      lines.push('the block was full of matter — some of yours rides the next one.');
  else if (v === 'spicy')     lines.push('fees were strong — your matter fed the miners well.');
  else if (v === 'crowded')   lines.push('the chain was awake — your matter joined the flow.');
  else                        lines.push('blocks were empty — the chain was hungry and you fed it.');

  if (STATE.rejected.length === 1)      lines.push('1 crumb rode to the next block.');
  else if (STATE.rejected.length > 1)   lines.push(STATE.rejected.length + ' crumbs rode to the next block.');

  if (STATE.leaks === 1)                lines.push('your wick leaked once — one tap was wasted.');
  else if (STATE.leaks > 1)             lines.push('your wick leaked ' + STATE.leaks + ' times — taps lost.');

  if (u.thirdEye === 'diamond')  lines.push('your diamond eye made it look easy.');
  if (u.thirdEye === 'oracle')   lines.push('your oracle eye saw it coming.');
  if (u.thirdEye === 'genesis')  lines.push('genesis eye — one tap was enough.');
  if (u.scheme === 'void')       lines.push('void shell — your receipt may read strange.');
  if (u.scheme === 'ember' && STATE.rejected.some(c => c.why === 'burnt')) lines.push('your ember burned the dust.');
  if (STATE.patched)             lines.push('your patch saved one tight spot.');
  return lines.slice(0, 3).join(' ');
}

function paintReceipt(root) {
  const r = STATE.receipt;
  const u = STATE.unatom;
  const passed = r.verdict.startsWith('NAT made it') || r.verdict.startsWith('UNAT settled');
  const stampCls = passed ? 'locked' : 'lost';
  const stampTxt = passed ? 'NAT<br>LOCKED' : 'COLD<br>PULL';
  const cat = UNATOM.CATEGORIES.find(c => c.els.includes(u.sym));
  const catLbl = cat ? cat.label.toLowerCase() : 'matter';
  const liveTip = STATE.weather && STATE.weather.tip ? STATE.weather.tip.toLocaleString() : '—';

  root.innerHTML =
    '<div class="receipt">' +
      '<div class="stamp ' + stampCls + '">' + stampTxt + '</div>' +
      '<div class="rcpt-hd"><h2>RUN THE BLOCK</h2><div class="sub">UNATOMS · NAT READY?</div></div>' +
      '<div class="rcpt-row"><span class="l">unatom</span><span class="v">#' + STATE.block.toLocaleString() + ' / 10,080</span></div>' +
      '<div class="rcpt-row"><span class="l">element</span><span class="v">' + u.sym + ' · ' + catLbl + '</span></div>' +
      '<div class="rcpt-row"><span class="l">shell</span><span class="v">' + u.scheme + '</span></div>' +
      '<div class="rcpt-row"><span class="l">bitcoin</span><span class="v">' + verdictLabel(STATE.weather.verdict) + '</span></div>' +
      '<div class="rcpt-row"><span class="l">newest block</span><span class="v">#' + liveTip + '</span></div>' +
      '<div class="rcpt-row"><span class="l">added</span><span class="v">' + r.ate + ' crumb' + (r.ate === 1 ? '' : 's') + ' · ' + r.eaten + ' vb</span></div>' +
      '<div class="rcpt-row"><span class="l">left over</span><span class="v">' + r.leftovers + '</span></div>' +
      '<div class="rcpt-row"><span class="l">overflow</span><span class="v">' + r.rejected + ' → next block</span></div>' +
      '<div class="rcpt-row"><span class="l">taps</span><span class="v">' + STATE.knocks + '</span></div>' +
      '<div class="rcpt-row"><span class="l">confirms</span><span class="v">6 of 6</span></div>' +
      '<div class="rcpt-row"><span class="l">wick</span><span class="v">' + r.wickState + '</span></div>' +
      '<div class="verdict">' + r.verdict + '</div>' +
      '<div class="diag">' + r.diag + '</div>' +
      '<div class="serial">§ ' + r.serial + '</div>' +
    '</div>' +
    '<button class="pill again big" id="runAgain">RUN A NEW UNATOM</button>' +
    '<button class="ghost" id="shareBtn">save my unatom →</button>' +
    '<a class="ghost" href="./unatom-prototype.html" style="text-decoration:none;display:inline-block">see all 10,080 unatoms →</a>';

  $('runAgain').onclick = () => { haptic(28); runAgain(); };
  $('shareBtn').onclick = () => sharePoster(u, STATE.block, r);
}

// ============================================================================
// POSTER  (camera-roll-saveable 1080x1350 visual share asset)
// ============================================================================

async function sharePoster(u, blk, r) {
  const btn = $('shareBtn');
  const original = btn.textContent;
  btn.textContent = 'building poster…';
  let blob;
  try {
    const cnv = await buildPosterCanvas(u, blk, r);
    blob = await new Promise(res => cnv.toBlob(res, 'image/png', 0.96));
    if (!blob) throw new Error('canvas tainted');
  } catch (e) {
    console.warn('poster build failed, falling back to text share', e);
    btn.textContent = original;
    return doShare(u, r);  // last-resort text share
  }
  const fname = 'unatom-' + blk + '.png';
  const file = new File([blob], fname, { type: 'image/png' });
  const text = 'I adopted UNATOM #' + blk.toLocaleString() + ' / 10,080 (' + u.scheme + ' ' + u.sym + ') and fed the chain. § ' + r.serial;
  const shareUrl = location.origin + location.pathname;
  // 1) Best path: native share sheet WITH the image file.
  //    On iOS X webview this surfaces "Save Image" → writes to Photos / Camera Roll.
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({ title: 'UNATOMS · NAT READY?', text, url: shareUrl, files: [file] });
      btn.textContent = 'shared ✓';
      return;
    } catch (e) {
      // user dismissed or share threw — still show the overlay so they can save
    }
  }
  // 2) Show the poster inline so user can long-press to save (iOS: "Add to Photos")
  showPosterOverlay(blob, fname, text + ' ' + shareUrl);
  btn.textContent = original;
}

function buildPosterCanvas(u, blk, r) {
  const W = 1080, H = 1350;
  const cnv = document.createElement('canvas');
  cnv.width = W; cnv.height = H;
  const ctx = cnv.getContext('2d');

  // Background — matches live UI bg
  ctx.fillStyle = '#0a0a0c';
  ctx.fillRect(0, 0, W, H);

  // Subtle vignette so the portrait pops
  const vg = ctx.createRadialGradient(W/2, H*0.42, 200, W/2, H*0.42, W*0.75);
  vg.addColorStop(0, 'rgba(243,238,227,0.05)');
  vg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, W, H);

  // Top band — wordmark + serial
  ctx.fillStyle = '#f3eee3';
  ctx.font = '700 30px -apple-system, system-ui, "Segoe UI", Roboto, sans-serif';
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'left';
  ctx.fillText('NAT READY?', 64, 80);
  ctx.textAlign = 'right';
  ctx.font = '600 22px ui-monospace, Menlo, monospace';
  ctx.fillStyle = 'rgba(243,238,227,0.55)';
  ctx.fillText('§ ' + r.serial, W - 64, 80);

  // Portrait (UNATOM SVG drawn into canvas)
  const opts = Object.assign({}, u, STATE.live || {});
  const svgStr = UNATOM.svg(opts);
  return drawSvgToCanvas(ctx, svgStr, 140, 150, 800, 800).then(() => {
    // Identity — big
    ctx.textAlign = 'center';
    ctx.fillStyle = '#f3eee3';
    ctx.font = '700 64px -apple-system, system-ui, "Segoe UI", Roboto, sans-serif';
    ctx.fillText('UNATOM #' + blk.toLocaleString(), W/2, 1020);

    // Category line
    const cat = UNATOM.CATEGORIES.find(c => c.els.includes(u.sym));
    const catLbl = cat ? cat.label.toLowerCase() : 'matter';
    ctx.font = '500 26px ui-monospace, Menlo, monospace';
    ctx.fillStyle = 'rgba(243,238,227,0.55)';
    ctx.fillText('of 10,080  ·  ' + u.sym + '  ·  ' + catLbl + '  ·  ' + u.scheme, W/2, 1062);

    // Verdict stamp
    const passed = r.verdict.startsWith('NAT made it') || r.verdict.startsWith('UNAT settled');
    const stampTxt = passed ? 'NAT LOCKED' : 'COLD PULL';
    const stampColor = passed ? '#7dcf5b' : '#f17d8e';
    ctx.font = '900 56px ui-monospace, "SF Mono", Menlo, monospace';
    ctx.fillStyle = stampColor;
    ctx.fillText(stampTxt, W/2, 1150);

    // Diagnosis (max 2 lines)
    ctx.font = 'italic 28px Georgia, "Times New Roman", serif';
    ctx.fillStyle = 'rgba(243,238,227,0.82)';
    wrapText(ctx, r.diag, W/2, 1218, W - 160, 36, 2);

    // Footer
    ctx.font = '600 18px ui-monospace, Menlo, monospace';
    ctx.fillStyle = 'rgba(243,238,227,0.4)';
    ctx.fillText('UNATOMS  ·  FEED THE CHAIN  ·  unatom.fun', W/2, 1310);

    return cnv;
  });
}

function drawSvgToCanvas(ctx, svgStr, x, y, w, h) {
  return new Promise((resolve, reject) => {
    const blob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => {
      ctx.drawImage(img, x, y, w, h);
      URL.revokeObjectURL(url);
      resolve();
    };
    img.onerror = (e) => { URL.revokeObjectURL(url); reject(e); };
    img.src = url;
  });
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight, maxLines) {
  const words = String(text).split(' ');
  const lines = [];
  let line = '';
  for (const wd of words) {
    const test = line ? line + ' ' + wd : wd;
    if (ctx.measureText(test).width > maxWidth && line) {
      lines.push(line);
      line = wd;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  const cap = Math.min(lines.length, maxLines || 3);
  for (let i = 0; i < cap; i++) {
    let l = lines[i];
    if (i === cap - 1 && lines.length > cap) l = l.replace(/\W*$/, '') + '…';
    ctx.fillText(l, x, y + i * lineHeight);
  }
}

function showPosterOverlay(blob, filename, shareText) {
  let ov = document.getElementById('posterOverlay');
  const url = URL.createObjectURL(blob);
  if (!ov) {
    ov = document.createElement('div');
    ov.id = 'posterOverlay';
    ov.className = 'poster-overlay';
    ov.innerHTML =
      '<img id="posterImg" alt="your unatom poster">' +
      '<div class="hint">tap & hold the image → <b>add to photos</b><br>then post on X / IG and tag <b>@takedmt</b></div>' +
      '<div class="row">' +
        '<a id="posterDl" class="primary">save</a>' +
        '<button id="posterCopy">copy caption</button>' +
        '<button id="posterClose">close</button>' +
      '</div>';
    document.body.appendChild(ov);
  }
  const img = document.getElementById('posterImg');
  if (img.src && img.src.startsWith('blob:')) URL.revokeObjectURL(img.src);
  img.src = url;

  const dl = document.getElementById('posterDl');
  dl.setAttribute('href', url);
  dl.setAttribute('download', filename);
  // Some iOS browsers ignore <a download> on cross-origin; here url is blob so it's same-origin.
  // For iOS Safari/X webview the long-press is the most reliable camera-roll path.

  document.getElementById('posterCopy').onclick = () => {
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(shareText).then(() => {
        document.getElementById('posterCopy').textContent = 'copied ✓';
      });
    }
  };
  document.getElementById('posterClose').onclick = () => {
    ov.classList.remove('show');
    setTimeout(() => { if (img.src.startsWith('blob:')) URL.revokeObjectURL(img.src); }, 800);
  };
  ov.classList.add('show');
}

function doShare(u, r) {
  const btn = $('shareBtn');
  const line = 'I ran Bitcoin with UNATOM #' + STATE.block.toLocaleString() + ' (' + u.scheme + ' ' + u.sym + '). ' +
               r.verdict + ' ' + r.diag + ' § ' + r.serial;
  const url = location.origin + location.pathname;
  // 1) Native Share API — best path on iOS X in-app browser + modern Android Chrome
  if (navigator.share) {
    navigator.share({ title: 'NAT READY? — UNATOMS', text: line, url }).then(() => {
      btn.textContent = 'shared ✓';
    }).catch(() => { copyShareLine(line + ' ' + url, btn); });
    return;
  }
  copyShareLine(line + ' ' + url, btn);
}

function copyShareLine(text, btn) {
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = 'copied ✓';
    }).catch(() => { execCopyFallback(text, btn); });
    return;
  }
  execCopyFallback(text, btn);
}

function execCopyFallback(text, btn) {
  // Legacy fallback — covers older X webview, in-app Safari before iOS 13
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.setAttribute('readonly', '');
  ta.style.cssText = 'position:fixed;top:0;left:0;width:1em;height:1em;opacity:0;pointer-events:none';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { ta.setSelectionRange(0, text.length); } catch (e) {}
  try {
    const ok = document.execCommand('copy');
    btn.textContent = ok ? 'copied ✓' : 'tap & hold to copy';
  } catch (e) {
    btn.textContent = 'tap & hold to copy';
  }
  document.body.removeChild(ta);
}

function rollSeriesBlock() {
  // Series 0 = 10,080 deterministic UNATOMS. Re-rolling gives the player VARIETY.
  const size = (typeof UNATOM !== 'undefined' && UNATOM.SERIES_SIZE) ? UNATOM.SERIES_SIZE : 10080;
  return 1 + Math.floor(Math.random() * size);
}

async function runAgain() {
  $('action').innerHTML = '';
  flash('pulling a fresh unatom…', 'one of 10,080 in series 0.');
  // Refresh weather in the background (don't block the new game on it)
  fetchWeather().then(w => { STATE.weather = w; paintWeather(w); });
  // Always roll a NEW random UNATOM — this is how players discover the catalog
  summon(rollSeriesBlock());
}

// ============================================================================
// BOOT
// ============================================================================

async function boot() {
  STATE.weather = await fetchWeather();
  paintWeather(STATE.weather);
  // Random Series 0 UNATOM on first load too — every visit shows variety.
  summon(rollSeriesBlock());
  setTimeout(() => { const b = $('boot'); if (b) b.style.display = 'none'; }, 320);

  // periodic weather refresh in ready/feed/receipt states
  setInterval(async () => {
    if (STATE.step === 'knock' || STATE.step === 'blinks') return;
    const w = await fetchWeather();
    STATE.weather = w;
    paintWeather(w);
    if (STATE.step === 'ready') flash(chainGreeting(), traitGreeting());
  }, 60000);
}

boot();
